mode: rule
allow-lan: false
unified-delay: false
tcp-concurrent: true
find-process-mode: always
global-client-fingerprint: ios
log-level: error
ipv6: true
udp: true
external-controller-tls: 127.0.0.1:99
tls:
  certificate: ./server.crt
  private-key: ./server.key
secret: 'n3e'
external-ui: WebUI/ZashBoard
global-ua: clash-verge/net-android
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'

geodata-mode: true
geox-url:
  geoip: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat'
  geosite: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat'
geo-auto-update: true
geo-update-interval: 48

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 443, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 853, 8443]
    QUIC:
      ports: [443, 853, 8443]
  skip-domain:
    - '+.push.apple.com'
    - 'Mijia Cloud'

tun:
  enable: true
  stack: mixed
  device: N3E
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  mtu: 1450
  dns-hijack:
    - any:53
    - tcp://any:53
    - udp://any:53
    - tcp://[::]:53
    - udp://[::]:53
  exclude-uid:
  exclude-package:
    #    - com.taobao.idlefish
    #    - com.microsoft.office.outlook
    - com.ss.android.ugc.aweme.mobile
    - com.baidu.BaiduMap
  route-exclude-address:
    - 0.0.0.0/8
    - 127.0.0.0/8
    - 192.168.0.0/16
    - 64.233.185.188/32
    - 64.233.188.188/32
    - 64.233.189.188/32
    - 74.125.23.188/32
    - 74.125.140.188/32
    - 74.125.200.188/32
    - 74.125.203.188/32
    - 74.125.204.188/32
    - 108.177.15.188/32
    - 108.177.97.188/32
    - 108.177.119.188/32
    - 108.177.125.188/32
    - 142.250.102.188/32
    - 142.250.142.188/32
    - 142.251.2.188/32
    - 142.251.8.188/32
    - 142.251.9.188/32
    - 142.251.10.188/32
    - 142.251.12.188/32
    - 172.253.113.188/32
    - 173.194.77.188/32
    - 173.194.221.188/32
    - '::/128'
    - '::1/128'
    - fc70::/10
    - fe80::/10
    - '2607:f8b0:4002:c03::bc/128'
    - '2607:f8b0:4023:1::bc/128'
    - '2607:f8b0:4023:c0b::bc/128'

dns:
  enable: true
  ipv6: true
  prefer-h3: true
  respect-rules: true
  use-hosts: true
  use-system-hosts: true
  default-nameserver:
    - 223.5.5.5
  enhanced-mode: fake-ip
  fake-ip-range: 10.0.0.0/16
  fake-ip-filter:
    - '*.lan'
    - 'stun.*'
    - '+.stun.*.*'
    - 'time.*.com'
    - 'ntp.org'

  nameserver-policy:
    'geosite:cn,private,googlefcm':
      - 'https://223.5.5.5/dns-query'

  nameserver:
    - 'https://1.0.0.1/dns-query'

  proxy-server-nameserver:
    - 'https://223.5.5.5/dns-query'

pp: &pp
  type: http
  interval: 21600
  health-check:
    enable: true
    url: https://www.google-analytics.com/generate_204
    interval: 7200
    timeout: 3000
    lazy: true
    expected-status: 204

proxy-providers:
  糖果:
    <<: *pp
    url: 'https://114.132.219.239:9888/tgyunsub?token=0b23063625802198b937248e5527a968'
    path: ./proxy_providers/糖果.yaml
  机场2:
    <<: *pp
    url: 'http://127.0.0.1:6789'
    path: ./proxy_providers/机场2.yaml

pg: &pg
  interval: 43200
  lazy: true
  timeout: 3000
  max-failed-times: 5
  expected-status: 204
  url: 'https://www.google-analytics.com/generate_204'

proxy-groups:
  - name: 代理
    type: select
    proxies:
      - 糖果
      - 机场2
      - 糖果负载均衡
      - 机场2负载均衡

  - name: 糖果
    <<: *pg
    type: select
    use:
      - 糖果

  - name: 机场2
    <<: *pg
    type: select
    use:
      - 机场2

  - name: 糖果负载均衡
    <<: *pg
    type: load-balance
    use:
      - 糖果
    filter: '美国|USA|美國|us|US|United States'
    strategy: consistent-hashing
    hidden: true

  - name: 机场2负载均衡
    <<: *pg
    type: load-balance
    use:
      - 机场2
    filter: '美国|USA|美國|us|US|United States'
    strategy: consistent-hashing
    hidden: true

  - name: 中国网站
    type: select
    proxies:
      - DIRECT
      - REJECT
      - 代理

rule-providers:
  userDirect:
    type: file
    behavior: classical
    path: ./rule_providers/userDirect.yaml
  userProxy:
    type: file
    behavior: classical
    path: ./rule_providers/userProxy.yaml
  秋风广告规则:
    type: http
    behavior: classical
    format: yaml
    path: ./rule_providers/AWAvenue-Ads-Rule-Clash.yaml
    url: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml'
    interval: 86400
  category-ads-all:
    type: http
    behavior: domain
    format: mrs
    path: ./rule_providers/category-ads-all.mrs
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs'
    interval: 86400

rules:
  - RULE-SET,userProxy,代理
  - RULE-SET,userDirect,中国网站
  - GEOSITE,googlefcm,DIRECT
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - RULE-SET,category-ads-all,REJECT
  - RULE-SET,秋风广告规则,REJECT
  - GEOSITE,CN,中国网站
  - GEOIP,CN,中国网站,no-resolve
  - MATCH,代理
